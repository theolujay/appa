---
- name: Converge
  hosts: all
  gather_facts: true
  ignore_errors: true
  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
  tasks:
    - name: Apply audit role
      ansible.builtin.include_role:
        name: audit
    - name: Ensure auditd is registered for service_facts
      ansible.builtin.command:
        cmd: systemctl show auditd.service --property=LoadState
      changed_when: false
      register: auditd_load
      failed_when: auditd_load.rc != 0 and 'unit not found' not in auditd_load.stderr
