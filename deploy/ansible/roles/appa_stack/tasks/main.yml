---
- name: Create directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ appa_stack_dir }}"
    - "{{ appa_stack_dir }}/data/postgres"
    - "{{ appa_stack_dir }}/data/caddy"
    - "{{ appa_stack_dir }}/data/railpack-cache"
    - "{{ appa_stack_dir }}/data/api"
    - "{{ appa_stack_dir }}/scripts"

- name: Create builds directory
  ansible.builtin.file:
    path: "{{ appa_stack_dir }}/builds"
    state: directory
    owner: "{{ deploy_user.name }}"
    group: appa-admin
    mode: "0755"

- name: Check if password file exists
  ansible.builtin.stat:
    path: "{{ appa_stack_dir }}/.pg_password"
  register: pg_password_file

- name: Generate random PostgreSQL password
  ansible.builtin.shell:
    cmd: set -o pipefail && tr -dc A-Za-z0-9 </dev/urandom | head -c 32 || true
    executable: /bin/bash
  register: pg_password_gen
  when: not pg_password_file.stat.exists
  changed_when: true

- name: Write PostgreSQL password file
  ansible.builtin.copy:
    content: "{{ pg_password_gen.stdout }}"
    dest: "{{ appa_stack_dir }}/.pg_password"
    mode: "0600"
  when: not pg_password_file.stat.exists

- name: Read PostgreSQL password
  ansible.builtin.slurp:
    src: "{{ appa_stack_dir }}/.pg_password"
  register: pg_password_slurp

- name: Set pg_password fact
  ansible.builtin.set_fact:
    pg_password: "{{ pg_password_slurp.content | b64decode | trim }}"

- name: Render .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ appa_stack_dir }}/.env"
    mode: "0600"
  no_log: true

- name: Render stack.data.yml
  ansible.builtin.template:
    src: stack.data.yml.j2
    dest: "{{ appa_stack_dir }}/stack.data.yml"
    mode: "0644"

- name: Render stack.base.yml
  ansible.builtin.template:
    src: stack.base.yml.j2
    dest: "{{ appa_stack_dir }}/stack.base.yml"
    mode: "0644"

- name: Render Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ appa_stack_dir }}/Caddyfile"
    mode: "0600"

- name: Render entrypoint.sh
  ansible.builtin.template:
    src: entrypoint.sh.j2
    dest: "{{ appa_stack_dir }}/scripts/entrypoint.sh"
    mode: "0755"

- name: Check if Docker Swarm is active
  ansible.builtin.command: docker info --format '{{ "{{.Swarm.LocalNodeState}}" }}'
  register: swarm_status
  changed_when: false

- name: Initialize Docker Swarm
  ansible.builtin.command:
    cmd: docker swarm init --advertise-addr "{{ ansible_default_ipv4.address }}"
  when: swarm_status.stdout != "active"
  changed_when: true

- name: Stat legacy compose file
  ansible.builtin.stat:
    path: "{{ appa_stack_dir }}/compose.yml"
  register: legacy_compose

- name: Stop legacy compose stack if running
  ansible.builtin.command:
    cmd: docker compose -f {{ appa_stack_dir }}/compose.yml down
  register: compose_down
  when: legacy_compose.stat.exists
  changed_when: compose_down.stdout | length > 0
  ignore_errors: true

- name: Prune legacy network configuration
  ansible.builtin.command:
    cmd: docker network rm appa_net
  register: appa_net_down
  when: >
    legacy_compose.stat.exists and
    compose_down.rc is defined and compose_down.rc == 0 and
    "Network appa_net" not in compose_down.stdout
  failed_when: false
  changed_when: "'appa_net' in appa_net_down.stdout"

- name: Create Docker Swarm network for Appa
  ansible.builtin.command:
    cmd: docker network create --driver overlay --attachable appa_net
  register: appa_net_up
  when: appa_net_down is skipped or appa_net_down is success
  failed_when:
    - appa_net_up.rc != 0
    - "'already exists' not in appa_net_up.stderr"
  changed_when: appa_net_up.stdout | length > 0

- name: Deploy the Appa Data Stack
  ansible.builtin.command:
    cmd: docker stack deploy --detach --prune --quiet -c {{ appa_stack_dir }}/stack.data.yml appa_data
  register: data_deploy
  changed_when: data_deploy.stdout | length > 0

- name: Deploy the Appa Server Stack
  ansible.builtin.command:
    cmd: docker stack deploy --detach --prune --quiet -c {{ appa_stack_dir }}/stack.base.yml appa
  register: stack_deploy
  changed_when: stack_deploy.stdout | length > 0
