---
- name: Create directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ appa_stack_dir }}"
    - "{{ appa_stack_dir }}/data/postgres"
    - "{{ appa_stack_dir }}/data/caddy"
    - "{{ appa_stack_dir }}/data/railpack-cache"
    - "{{ appa_stack_dir }}/data/api"
    - "{{ appa_stack_dir }}/scripts"

- name: Create builds directory
  ansible.builtin.file:
    path: "{{ appa_stack_dir }}/builds"
    state: directory
    owner: "{{ deploy_user.name }}"
    group: appa-admin
    mode: "0755"

- name: Check if password file exists
  ansible.builtin.stat:
    path: "{{ appa_stack_dir }}/.pg_password"
  register: pg_password_file

- name: Generate random PostgreSQL password
  ansible.builtin.shell:
    cmd: set -o pipefail && tr -dc A-Za-z0-9 </dev/urandom | head -c 32
    executable: /bin/bash
  register: pg_password_gen
  when: not pg_password_file.stat.exists
  changed_when: true

- name: Write PostgreSQL password file
  ansible.builtin.copy:
    content: "{{ pg_password_gen.stdout }}"
    dest: "{{ appa_stack_dir }}/.pg_password"
    mode: "0600"
  when: not pg_password_file.stat.exists

- name: Read PostgreSQL password
  ansible.builtin.slurp:
    src: "{{ appa_stack_dir }}/.pg_password"
  register: pg_password_slurp

- name: Set pg_password fact
  ansible.builtin.set_fact:
    pg_password: "{{ pg_password_slurp.content | b64decode | trim }}"

- name: Render .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ appa_stack_dir }}/.env"
    mode: "0600"
  no_log: true

- name: Render compose.yml
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ appa_stack_dir }}/compose.yml"
    mode: "0644"

- name: Render Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ appa_stack_dir }}/Caddyfile"
    mode: "0600"

- name: Render entrypoint.sh
  ansible.builtin.template:
    src: entrypoint.sh.j2
    dest: "{{ appa_stack_dir }}/scripts/entrypoint.sh"
    mode: "0755"

- name: Start the Appa Stack
  ansible.builtin.command:
    cmd: docker compose -f {{ appa_stack_dir }}/compose.yml up -d
  register: compose_up
  changed_when: compose_up.stdout | length > 0
