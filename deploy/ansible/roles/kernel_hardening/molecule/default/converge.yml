---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    disable_ipv6: false
  pre_tasks:
    - name: Ensure modprobe.d directory exists
      ansible.builtin.file:
        path: /etc/modprobe.d
        state: directory
        owner: root
        group: root
        mode: "0755"
  tasks:
    - name: Apply kernel_hardening role
      ansible.builtin.include_role:
        name: kernel_hardening