---
- name: Gather service facts
  ansible.builtin.service_facts:

- name: Select SSH service name
  ansible.builtin.set_fact:
    ssh_service_name: >-
      {{ 'ssh' if 'ssh.service' in ansible_facts.services else
         'sshd' if 'sshd.service' in ansible_facts.services else '' }}

- name: Verify SSH service exists
  ansible.builtin.assert:
    that:
      - ssh_service_name | length > 0
    fail_msg: "Neither ssh.service nor sshd.service was found on this host"
    success_msg: "Using {{ ssh_service_name }} service for SSH restarts"

- name: Configure SSH daemon
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: restart sshd

- name: Ensure SSH host keys have correct permissions
  ansible.builtin.file:
    path: "{{ item }}"
    state: file
    owner: root
    group: root
    mode: "0600"
  loop:
    - /etc/ssh/ssh_host_rsa_key
    - /etc/ssh/ssh_host_ecdsa_key
    - /etc/ssh/ssh_host_ed25519_key
  notify: restart sshd

- name: Remove weak SSH host keys
  ansible.builtin.file:
    path: /etc/ssh/ssh_host_dsa_key
    state: absent
  notify: restart sshd

- name: Configure SSH banner
  ansible.builtin.copy:
    content: |
      *******************************************************************
      *                         WARNING                                 *
      *          This system is for authorized users only.              *
      *          All activities are logged and monitored.               *
      *          Unauthorized access will be prosecuted.                *
      *******************************************************************
    dest: /etc/ssh/banner
    owner: root
    group: root
    mode: "0644"
