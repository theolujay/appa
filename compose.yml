configs:
  db_init:
    file: ./scripts/db-init.sh


networks:
  appa_net:
    name: appa_net
    driver: bridge

volumes:
  appa_db:
  api_data:
  caddy_data:
  caddy_config:
  railpack_cache:

services:
  db:
    env_file:
      - .env
    configs:
      - source: db_init
        target: /docker-entrypoint-initdb.d/init.sh
        mode: 0755
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    image: postgres:18.3-bookworm
    networks:
      - "appa_net"
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - appa_db:/var/lib/postgresql
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - "./bin/linux_amd64/api"
      - "-port=$PORT"
      - "-env=$ENV"
      - "-db-dsn=$APPA_DB_DSN"
      - "-db-max-open-conns=$DB_MAX_OPEN_CONNS"
      - "-db-max-idle-conns=$DB_MAX_IDLE_CONNS"
      - "-db-max-idle-time=$DB_MAX_IDLE_TIME"
      - "-limiter-rps=$LIMITER_RPS"
      - "-limiter-burst=$LIMITER_BURST"
      - "-limiter-enabled=$LIMITER_ENABLED"
      - "-smtp-host=$SMTP_HOST"
      - "-smtp-port=$SMTP_PORT"
      - "-smtp-username=$SMTP_USERNAME"
      - "-smtp-password=$SMTP_PASSWORD"
      - "-smtp-sender=$SMTP_SENDER"
      - "-cors-trusted-origins=$CORS_TRUSTED_ORIGINS"
    depends_on:
      db:
        condition: service_healthy
      caddy:
        condition: service_started
      buildkit:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BUILDKIT_HOST: "docker-container://buildkit"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    image: "api:dev"
    networks:
      - "appa_net"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - api_data:/data
      - railpack_cache:/tmp/railpack

  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    networks:
      - "appa_net"
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  caddy:
    image: caddy:2.11.2-alpine
    ports:
      - "80:80"
      - "2019:2019"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - "appa_net"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./ui/src
          target: /app/src
    image: "ui:dev"
    networks:
      - "appa_net"
    volumes:
      - ./ui:/app
      - /app/node_modules

