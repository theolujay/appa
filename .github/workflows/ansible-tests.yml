name: Ansible Tests

on:
  push:
    branches: [main]
    paths:
      - "deploy/ansible/**"
  pull_request:
    branches: [main]
    paths:
      - "deploy/ansible/**"

env:
  ANSIBLE_DIR: deploy/ansible
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.ANSIBLE_DIR }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run ansible-lint
        run: ansible-lint --profile production

  molecule:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - role: kernel_hardening
            dir: roles/kernel_hardening
          - role: access_control
            dir: roles/access_control
          - role: ssh_hardening
            dir: roles/ssh_hardening
          - role: firewall
            dir: roles/firewall
          - role: audit
            dir: roles/audit
          - role: playbook
            dir: playbooks/security-hardening
    defaults:
      run:
        working-directory: ${{ env.ANSIBLE_DIR }}/${{ matrix.scenario.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install ansible collections
        run: |
          ansible-galaxy collection install community.general
          ansible-galaxy collection install ansible.posix
      - name: Run molecule test
        run: molecule test
